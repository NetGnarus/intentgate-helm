apiVersion: v2
name: intentgate
description: |
  IntentGate is a self-hosted authorization gateway for AI agents.
  This chart deploys the gateway and (optionally) the intent extractor
  service. Both run in the customer environment; no IntentGate cloud
  is contacted.
type: application

# Chart version follows semver and is independent of appVersion.
# Bump on chart-shape changes; bump appVersion on gateway image bumps.
# 0.6.0 adds an optional demoUpstream block that deploys the
# demo tool server alongside the gateway and wires
# INTENTGATE_UPSTREAM_URL automatically. Minor chart bump because
# it's a new value block + two new templates (additive, default off
# — existing deployments unchanged).
version: 0.6.0

# The gateway/extractor image tag this chart's defaults reference.
# v1.5.1 unchanged from chart 0.5.3 — the demoUpstream block in
# 0.6.0 doesn't require a gateway code change (it just wires the
# existing INTENTGATE_UPSTREAM_URL env var to a chart-managed
# tool server). Demo upstream image:
#   ghcr.io/netgnarus/intentgate-demo-toolserver:0.1.0
appVersion: "1.5.1"

home: https://github.com/NetGnarus/intentgate-gateway
sources:
  - https://github.com/NetGnarus/intentgate-gateway
  - https://github.com/NetGnarus/intentgate-extractor

maintainers:
  - name: IntentGate contributors
    url: https://github.com/NetGnarus

keywords:
  - ai-agents
  - authorization
  - mcp
  - opa
  - security

annotations:
  category: Security
