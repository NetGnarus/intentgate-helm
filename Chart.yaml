apiVersion: v2
name: intentgate
description: |
  IntentGate is a self-hosted authorization gateway for AI agents.
  This chart deploys the gateway and (optionally) the intent extractor
  service. Both run in the customer environment; no IntentGate cloud
  is contacted.
type: application

# Chart version follows semver and is independent of appVersion.
# Bump on chart-shape changes; bump appVersion on gateway image bumps.
# 0.5.3 is an appVersion-only bump to 1.5.1 (DELETE /v1/admin/policies/active
# endpoint + console-pro per-tenant scope UI). No new chart values,
# no template changes — additive convenience surface on top of v1.5.0.
version: 0.5.3

# The gateway/extractor image tag this chart's defaults reference.
# v1.5.1 = DELETE /v1/admin/policies/active endpoint. A per-tenant
# admin can now clear their tenant's slot in one call so subsequent
# requests fall back to the default-fallback policy, instead of
# rolling back through every previous draft. The default-fallback
# slot itself is protected (DeleteActive("") is a no-op so the
# gateway always has SOMETHING to serve). Cross-replica refresh
# carries the clear signal via the existing LISTEN/NOTIFY path.
# Everything from v1.5.0 still applies. Extractor stays on 0.1.0.
appVersion: "1.5.1"

home: https://github.com/NetGnarus/intentgate-gateway
sources:
  - https://github.com/NetGnarus/intentgate-gateway
  - https://github.com/NetGnarus/intentgate-extractor

maintainers:
  - name: IntentGate contributors
    url: https://github.com/NetGnarus

keywords:
  - ai-agents
  - authorization
  - mcp
  - opa
  - security

annotations:
  category: Security
