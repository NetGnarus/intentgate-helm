apiVersion: v2
name: intentgate
description: |
  IntentGate is a self-hosted authorization gateway for AI agents.
  This chart deploys the gateway and (optionally) the intent extractor
  service. Both run in the customer environment; no IntentGate cloud
  is contacted.
type: application

# Chart version follows semver and is independent of appVersion.
# Bump on chart-shape changes; bump appVersion on gateway image bumps.
# 0.5.0 adds the gateway.policyStore value (wires the draft-policies
# CRUD + active-pointer + rollback endpoints in gateway v1.4 into the
# deployment env).
version: 0.5.0

# The gateway/extractor image tag this chart's defaults reference.
# v1.4.0 = draft-policies CRUD, active-pointer, one-step rollback,
# in-process runtime reload on promote. Console-pro /policies gets
# "Save as draft" + drafts panel + promote/rollback. Everything from
# v1.3 still applies (audit schema v4 with opt-in argument-value
# persistence). Extractor stays on 0.1.0 (no new release yet); pinned
# in values.yaml's extractor.image.tag.
appVersion: "1.4.0"

home: https://github.com/NetGnarus/intentgate-gateway
sources:
  - https://github.com/NetGnarus/intentgate-gateway
  - https://github.com/NetGnarus/intentgate-extractor

maintainers:
  - name: IntentGate contributors
    url: https://github.com/NetGnarus

keywords:
  - ai-agents
  - authorization
  - mcp
  - opa
  - security

annotations:
  category: Security
