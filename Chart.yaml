apiVersion: v2
name: intentgate
description: |
  IntentGate is a self-hosted authorization gateway for AI agents.
  This chart deploys the gateway and (optionally) the intent extractor
  service. Both run in the customer environment; no IntentGate cloud
  is contacted.
type: application

# Chart version follows semver and is independent of appVersion.
# Bump on chart-shape changes; bump appVersion on gateway image bumps.
# 0.6.1 is a patch bump that wraps gateway v1.6.1 — no template
# or values changes, just the default image tag advancing. Pulls in
# the three Postgres-backend fixes shipped in gateway 1.6.1
# (fresh-install policy_active PK, audit verify timestamp truncation,
# escalate-event canonical hash columns). Deployments using
# in-memory backends are unaffected but should still upgrade for
# consistency. See gateway v1.6.1 release notes for details:
#   https://github.com/NetGnarus/intentgate-gateway/releases/tag/v1.6.1
version: 0.6.1

# The gateway image tag this chart's defaults reference. Extractor
# stays pinned to its own released tag in values.yaml (0.1.0, unchanged
# this cycle). Demo-upstream image (from 0.6.0's demoUpstream block)
# also unchanged at 0.1.0:
#   ghcr.io/netgnarus/intentgate-demo-toolserver:0.1.0
appVersion: "1.6.1"

home: https://github.com/NetGnarus/intentgate-gateway
sources:
  - https://github.com/NetGnarus/intentgate-gateway
  - https://github.com/NetGnarus/intentgate-extractor

maintainers:
  - name: IntentGate contributors
    url: https://github.com/NetGnarus

keywords:
  - ai-agents
  - authorization
  - mcp
  - opa
  - security

annotations:
  category: Security
