apiVersion: v2
name: intentgate
description: |
  IntentGate is a self-hosted authorization gateway for AI agents.
  This chart deploys the gateway and (optionally) the intent extractor
  service. Both run in the customer environment; no IntentGate cloud
  is contacted.
type: application

# Chart version follows semver and is independent of appVersion.
# Bump on chart-shape changes; bump appVersion on gateway image bumps.
version: 0.1.2

# The gateway/extractor image tag this chart's defaults reference.
# v0.3.0 = gateway with token revocation (Postgres-backed) + admin API.
# Extractor stays on 0.1.0 (no new release yet); pinned in values.yaml's
# extractor.image.tag.
appVersion: "0.3.0"

home: https://github.com/NetGnarus/intentgate-gateway
sources:
  - https://github.com/NetGnarus/intentgate-gateway
  - https://github.com/NetGnarus/intentgate-extractor

maintainers:
  - name: IntentGate contributors
    url: https://github.com/NetGnarus

keywords:
  - ai-agents
  - authorization
  - mcp
  - opa
  - security

annotations:
  category: Security
