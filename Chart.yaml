apiVersion: v2
name: intentgate
description: |
  IntentGate is a self-hosted authorization gateway for AI agents.
  This chart deploys the gateway and (optionally) the intent extractor
  service. Both run in the customer environment; no IntentGate cloud
  is contacted.
type: application

# Chart version follows semver and is independent of appVersion.
# Bump on chart-shape changes; bump appVersion on gateway image bumps.
# 0.5.2 is an appVersion-only bump to 1.5.0 (per-tenant active
# policies). No new chart values, no template changes — the
# behavior activates automatically when gateway.policyStore is set;
# per-tenant admins now use their existing INTENTGATE_TENANT_ADMINS
# tokens to promote within their tenant.
version: 0.5.2

# The gateway/extractor image tag this chart's defaults reference.
# v1.5.0 = per-tenant active policies. The policy_active table
# moves from a single 'global' row to one row per tenant; the
# Reloader holds a map of compiled engines and dispatches each
# request to the right one based on the verified capability
# token's tenant claim. Per-tenant admins promote within their
# own tenant (the v1.4 superadmin-only restriction is removed).
# Tenants without their own promoted policy fall back to the
# default slot — preserves v1.4 single-tenant semantics.
# Schema migration is automatic (idempotent ALTER + PK swap on
# startup); the existing 'global' row backfills to tenant=''.
# Everything from v1.4 still applies (cross-replica refresh via
# LISTEN/NOTIFY, draft CRUD, etc.). Extractor stays on 0.1.0.
appVersion: "1.5.0"

home: https://github.com/NetGnarus/intentgate-gateway
sources:
  - https://github.com/NetGnarus/intentgate-gateway
  - https://github.com/NetGnarus/intentgate-extractor

maintainers:
  - name: IntentGate contributors
    url: https://github.com/NetGnarus

keywords:
  - ai-agents
  - authorization
  - mcp
  - opa
  - security

annotations:
  category: Security
