{{/*
Master-key Secret. Only rendered when:
  - the user did NOT point at an existingMasterKeySecret, AND
  - they supplied a masterKey value inline.

If neither is set, no Secret is created and the gateway falls back to
generating an ephemeral key at startup (logged once, lost on restart).
*/}}
{{- if and (not .Values.gateway.existingMasterKeySecret) .Values.gateway.masterKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "intentgate.masterKeySecretName" . }}
  labels:
    {{- include "intentgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  {{ .Values.gateway.masterKeySecretKey }}: {{ .Values.gateway.masterKey | quote }}
{{- end -}}
