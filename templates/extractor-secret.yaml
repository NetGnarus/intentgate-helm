{{/*
Anthropic API-key Secret. Only rendered when:
  - the extractor is enabled, AND
  - stub mode is NOT being used, AND
  - the user did NOT point at an existingApiKeySecret, AND
  - they supplied an anthropicApiKey value inline.
*/}}
{{- if and .Values.extractor.enabled (not .Values.extractor.stubMode) (not .Values.extractor.existingApiKeySecret) .Values.extractor.anthropicApiKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "intentgate.extractor.apiKeySecretName" . }}
  labels:
    {{- include "intentgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: extractor
type: Opaque
stringData:
  {{ .Values.extractor.apiKeySecretKey }}: {{ .Values.extractor.anthropicApiKey | quote }}
{{- end -}}
