{{- if .Values.demoUpstream.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "intentgate.demoUpstream.fullname" . }}
  labels:
    {{- include "intentgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-upstream
spec:
  type: {{ .Values.demoUpstream.service.type }}
  ports:
    - port: {{ .Values.demoUpstream.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "intentgate.demoUpstream.matchLabels" . | nindent 4 }}
{{- end -}}
