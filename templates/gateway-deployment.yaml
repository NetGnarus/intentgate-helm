apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intentgate.gateway.fullname" . }}
  labels:
    {{- include "intentgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "intentgate.gateway.matchLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "intentgate.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
        {{- with .Values.gateway.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.gateway.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "intentgate.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "intentgate.gateway.image" . | quote }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: INTENTGATE_ADDR
              value: ":8080"
            - name: INTENTGATE_REQUIRE_CAPABILITY
              value: {{ .Values.gateway.requireCapability | quote }}
            - name: INTENTGATE_REQUIRE_INTENT
              value: {{ .Values.gateway.requireIntent | quote }}
            - name: INTENTGATE_REQUIRE_BUDGET
              value: {{ .Values.gateway.requireBudget | quote }}
            - name: INTENTGATE_AUDIT_TARGET
              value: {{ .Values.gateway.auditTarget | quote }}
            {{- if .Values.gateway.auditPersist }}
            - name: INTENTGATE_AUDIT_PERSIST
              value: "true"
            {{- end }}
            {{- if .Values.gateway.approvalsBackend }}
            - name: INTENTGATE_APPROVALS_BACKEND
              value: {{ .Values.gateway.approvalsBackend | quote }}
            {{- end }}
            {{- if .Values.gateway.approvalTimeoutSeconds }}
            - name: INTENTGATE_APPROVAL_TIMEOUT_S
              value: {{ .Values.gateway.approvalTimeoutSeconds | quote }}
            {{- end }}
            {{- if .Values.gateway.tenantAdmins }}
            - name: INTENTGATE_TENANT_ADMINS
              value: {{ .Values.gateway.tenantAdmins | quote }}
            {{- end }}
            {{- if .Values.gateway.siem.splunk.url }}
            - name: INTENTGATE_SIEM_SPLUNK_URL
              value: {{ .Values.gateway.siem.splunk.url | quote }}
            - name: INTENTGATE_SIEM_SPLUNK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "intentgate.splunkTokenSecretName" . }}
                  key: {{ .Values.gateway.siem.splunk.tokenSecretKey }}
            {{- if .Values.gateway.siem.splunk.index }}
            - name: INTENTGATE_SIEM_SPLUNK_INDEX
              value: {{ .Values.gateway.siem.splunk.index | quote }}
            {{- end }}
            {{- end }}
            {{- if or .Values.gateway.siem.datadog.apiKey .Values.gateway.siem.datadog.existingApiKeySecret }}
            - name: INTENTGATE_SIEM_DATADOG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "intentgate.datadogApiKeySecretName" . }}
                  key: {{ .Values.gateway.siem.datadog.apiKeySecretKey }}
            {{- if .Values.gateway.siem.datadog.site }}
            - name: INTENTGATE_SIEM_DATADOG_SITE
              value: {{ .Values.gateway.siem.datadog.site | quote }}
            {{- end }}
            {{- if .Values.gateway.siem.datadog.service }}
            - name: INTENTGATE_SIEM_DATADOG_SERVICE
              value: {{ .Values.gateway.siem.datadog.service | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.gateway.siem.sentinel.dceUrl }}
            - name: INTENTGATE_SIEM_SENTINEL_DCE_URL
              value: {{ .Values.gateway.siem.sentinel.dceUrl | quote }}
            - name: INTENTGATE_SIEM_SENTINEL_DCR_ID
              value: {{ .Values.gateway.siem.sentinel.dcrImmutableId | quote }}
            - name: INTENTGATE_SIEM_SENTINEL_STREAM
              value: {{ .Values.gateway.siem.sentinel.streamName | quote }}
            - name: INTENTGATE_SIEM_SENTINEL_TENANT_ID
              value: {{ .Values.gateway.siem.sentinel.tenantId | quote }}
            - name: INTENTGATE_SIEM_SENTINEL_CLIENT_ID
              value: {{ .Values.gateway.siem.sentinel.clientId | quote }}
            - name: INTENTGATE_SIEM_SENTINEL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "intentgate.sentinelClientSecretSecretName" . }}
                  key: {{ .Values.gateway.siem.sentinel.clientSecretSecretKey }}
            {{- end }}
            {{- if .Values.extractor.enabled }}
            - name: INTENTGATE_EXTRACTOR_URL
              value: "http://{{ include "intentgate.extractor.fullname" . }}:{{ .Values.extractor.service.port }}"
            {{- end }}
            {{- if .Values.redisUrl }}
            - name: INTENTGATE_REDIS_URL
              value: {{ .Values.redisUrl | quote }}
            {{- end }}
            {{- if or .Values.postgresUrl .Values.existingPostgresUrlSecret }}
            - name: INTENTGATE_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "intentgate.postgresUrlSecretName" . }}
                  key: {{ .Values.postgresUrlSecretKey }}
            {{- end }}
            {{- if or .Values.gateway.adminToken .Values.gateway.existingAdminTokenSecret }}
            - name: INTENTGATE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "intentgate.adminTokenSecretName" . }}
                  key: {{ .Values.gateway.adminTokenSecretKey }}
            {{- end }}
            {{- if .Values.gateway.metrics.enabled }}
            - name: INTENTGATE_METRICS_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.gateway.tracing.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.gateway.tracing.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: "intentgate-gateway"
            {{- end }}
            {{- if .Values.gateway.policy }}
            - name: INTENTGATE_POLICY_FILE
              value: /etc/intentgate/policy/policy.rego
            {{- else if .Values.gateway.existingPolicyConfigMap }}
            - name: INTENTGATE_POLICY_FILE
              value: /etc/intentgate/policy/policy.rego
            {{- end }}
            {{- if or .Values.gateway.masterKey .Values.gateway.existingMasterKeySecret }}
            - name: INTENTGATE_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "intentgate.masterKeySecretName" . }}
                  key: {{ .Values.gateway.masterKeySecretKey }}
            {{- end }}
            {{- with .Values.gateway.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.gateway.policy .Values.gateway.existingPolicyConfigMap }}
          volumeMounts:
            - name: policy
              mountPath: /etc/intentgate/policy
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            # 65532 is the well-known UID of the "nonroot" user in
            # gcr.io/distroless/static:nonroot (the gateway's runtime
            # base image). Setting it explicitly here lets the kubelet
            # validate runAsNonRoot without inspecting the image.
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
      {{- if or .Values.gateway.policy .Values.gateway.existingPolicyConfigMap }}
      volumes:
        - name: policy
          configMap:
            name: {{ include "intentgate.policyConfigMapName" . }}
      {{- end }}
      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
