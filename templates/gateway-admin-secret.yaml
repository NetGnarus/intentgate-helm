{{/*
Admin-token Secret. Only rendered when:
  - the user did NOT point at an existingAdminTokenSecret, AND
  - they supplied gateway.adminToken inline.

If neither is set, no Secret is created and the gateway does NOT
register the /v1/admin/* endpoints (revocation, list-revocations).
That's the safe default — admin endpoints unavailable beats admin
endpoints with no auth.
*/}}
{{- if and (not .Values.gateway.existingAdminTokenSecret) .Values.gateway.adminToken -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "intentgate.adminTokenSecretName" . }}
  labels:
    {{- include "intentgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  {{ .Values.gateway.adminTokenSecretKey }}: {{ .Values.gateway.adminToken | quote }}
{{- end -}}
