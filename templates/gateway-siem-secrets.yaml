{{/*
SIEM Secrets. Each renders only when the operator supplied an inline
credential AND did not point at an existing Secret. Empty config means
no Secret is created and the gateway simply skips that emitter.
*/}}
{{- if and (not .Values.gateway.siem.splunk.existingTokenSecret) .Values.gateway.siem.splunk.token -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "intentgate.splunkTokenSecretName" . }}
  labels:
    {{- include "intentgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  {{ .Values.gateway.siem.splunk.tokenSecretKey }}: {{ .Values.gateway.siem.splunk.token | quote }}
---
{{- end -}}
{{- if and (not .Values.gateway.siem.datadog.existingApiKeySecret) .Values.gateway.siem.datadog.apiKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "intentgate.datadogApiKeySecretName" . }}
  labels:
    {{- include "intentgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  {{ .Values.gateway.siem.datadog.apiKeySecretKey }}: {{ .Values.gateway.siem.datadog.apiKey | quote }}
---
{{- end -}}
{{- if and (not .Values.gateway.siem.sentinel.existingClientSecretSecret) .Values.gateway.siem.sentinel.clientSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "intentgate.sentinelClientSecretSecretName" . }}
  labels:
    {{- include "intentgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  {{ .Values.gateway.siem.sentinel.clientSecretSecretKey }}: {{ .Values.gateway.siem.sentinel.clientSecret | quote }}
{{- end -}}
