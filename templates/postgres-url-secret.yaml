{{/*
Postgres URL Secret. Only rendered when:
  - the user did NOT point at an existingPostgresUrlSecret, AND
  - they supplied postgresUrl inline.

If neither is set, no Secret is created and the gateway falls back
to its in-memory revocation store (single-replica only, lost on
restart). That's the friendly default for dev installs.
*/}}
{{- if and (not .Values.existingPostgresUrlSecret) .Values.postgresUrl -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "intentgate.postgresUrlSecretName" . }}
  labels:
    {{- include "intentgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  {{ .Values.postgresUrlSecretKey }}: {{ .Values.postgresUrl | quote }}
{{- end -}}
